name: smart_pet_feeder
description: AI-Powered Smart Pet Feeder mobile application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.18.0
  cloud_firestore: ^4.15.0
  firebase_database: ^10.4.4
  firebase_messaging: ^14.7.20
  flutter_local_notifications: ^17.1.2

  # State management
  provider: ^6.1.2

  # Charts
  fl_chart: ^0.68.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.3.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.3.3
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4CAF50"
  adaptive_icon_foreground: "assets/images/app_icon.png"
